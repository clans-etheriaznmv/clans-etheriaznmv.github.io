<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información de la actualización</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 700px;
            padding: 35px;
            border: 1px solid #e1e4e8;
        }
        .header {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: 800;
            color: #1a2b49;
            margin-bottom: 25px;
        }
        .banner {
            background-color: #fffbeb;
            border-left: 5px solid #fbbf24;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .label {
            font-size: 13px;
            text-transform: uppercase;
            color: #6b7280;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .value {
            font-size: 16px;
            color: #374151;
            font-weight: 500;
        }
        /* Estilo para la sección de créditos */
        .credits-box {
            background-color: #f3f4f6;
            border-left: 4px solid #9ca3af;
            padding: 15px 20px;
            border-radius: 6px;
            margin-top: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            font-size: 14px;
        }
        .credits-label {
            color: #6b7280;
            font-weight: 800;
            text-transform: uppercase;
            margin-right: 8px;
        }
        .tag-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            border-top: 1px solid #f3f4f6;
            padding-top: 25px;
            justify-content: center;
        }
        .tag {
            padding: 8px 18px;
            border-radius: 25px;
            color: white;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">˖ㅤ⊹ㅤ ࣪ Información de la actualización 🪽</div>
    
    <div class="banner">
        <div style="color: #6b7280; font-weight: 800; font-size: 12px; margin-bottom: 8px; text-transform: uppercase;">NUEVO SISTEMA DE CLANES</div>
        <div style="font-size: 18px; font-weight: 600;">¡Guerras de clanes, nuevos rangos & recompensas exclusivas!</div>
    </div>

    <div class="stats-grid">
        <div>
            <div class="label">Número</div>
            <div class="value">#0001 (NEW)</div>
        </div>
        <div>
            <div class="label">Publicación</div>
            <div class="value">26-04-2026</div>
        </div>
        <div>
            <div class="label">Desarrollo</div>
            <div class="value">0 días</div>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <div class="label">Tipo</div>
        <div class="value">Novedad / Grande</div>
    </div>

    <div class="credits-box">
        <span class="credits-label">Créditos</span>
        <span style="color: #374151; font-weight: 500;">dosmenosdos</span>
    </div>

    <div class="tag-container">
        <div class="tag" style="background: #9061f9;">COSAS NUEVAS</div>
        <div class="tag" style="background: #10b981;">CAMBIOS LIGEROS</div>
        <div class="tag" style="background: #f59e0b;">AJUSTES</div>
        <div class="tag" style="background: #06b6d4;">CAMBIOS INTERNOS</div>
        <div class="tag" style="background: #ef4444;">CORRECCIONES</div>
    </div>
</div>

</body>
</html>
