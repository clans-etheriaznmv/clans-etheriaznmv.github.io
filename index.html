<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información de la actualización</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border: 1px solid #e1e4e8;
        }
        .header {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #1a2b49;
            margin-bottom: 20px;
        }
        .banner {
            background-color: #fffbeb;
            border-left: 5px solid #fbbf24;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 25px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #6b7280;
            font-weight: bold;
        }
        .stat-value {
            font-size: 16px;
            color: #374151;
            margin-top: 5px;
        }
        .tag-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .tag {
            padding: 6px 15px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">⭐ Información de la actualización</div>
    
    <div class="banner">
        <small style="color: #6b7280; font-weight: bold;">LUNA Y GUERRAS</small><br>
        <strong>¡Warp Luna, Nuevo sistema de guerras & más!</strong>
    </div>

    <div class="stats-grid">
        <div>
            <div class="stat-label">NÚMERO</div>
            <div class="stat-value">#12 (Global #1195)</div>
        </div>
        <div>
            <div class="stat-label">PUBLICACIÓN</div>
            <div class="stat-value">17-04-2026</div>
        </div>
        <div>
            <div class="stat-label">DESARROLLO</div>
            <div class="stat-value">23 días</div>
        </div>
    </div>

    <div class="tag-container">
        <div class="tag" style="background: #9061f9;">Cosas Nuevas</div>
        <div class="tag" style="background: #10b981;">Ligeros Cambios</div>
        <div class="tag" style="background: #f59e0b;">Balance</div>
        <div class="tag" style="background: #06b6d4;">Internos</div>
        <div class="tag" style="background: #ef4444;">Correcciones</div>
    </div>
</div>

</body>
</html>
